<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 150" width="820" height="150" role="img" aria-label="An arrow fires from a bow and hits the bullseye">
  <!-- bow -->
  <g stroke="#8B949E" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M52 35 Q 96 75 52 115"/>
    <line x1="52" y1="35" x2="52" y2="115"/>
  </g>

  <!-- flight guide -->
  <line x1="100" y1="75" x2="696" y2="75" stroke="#8B949E" stroke-width="2" stroke-dasharray="2 10" opacity="0.35"/>

  <!-- arrow -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0; 622 0; 622 0" keyTimes="0;0.32;1" calcMode="spline" keySplines="0.3 0 0.2 1; 0 0 1 1" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;1;1;0;1" keyTimes="0;0.32;0.94;0.985;1" dur="4.5s" repeatCount="indefinite"/>
    <line x1="48" y1="75" x2="114" y2="75" stroke="#F97316" stroke-width="3.5" stroke-linecap="round"/>
    <polygon points="114,68 128,75 114,82" fill="#F97316"/>
    <g stroke="#FBBF24" stroke-width="3" stroke-linecap="round">
      <line x1="48" y1="75" x2="38" y2="66"/>
      <line x1="48" y1="75" x2="38" y2="84"/>
      <line x1="58" y1="75" x2="48" y2="66"/>
      <line x1="58" y1="75" x2="48" y2="84"/>
    </g>
  </g>

  <!-- target -->
  <circle cx="750" cy="75" r="40" fill="none" stroke="#F97316" stroke-width="4">
    <animate attributeName="r" values="40;40;46;40;40" keyTimes="0;0.32;0.4;0.5;1" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="75" r="26" fill="none" stroke="#8B949E" stroke-width="4">
    <animate attributeName="r" values="26;26;31;26;26" keyTimes="0;0.32;0.41;0.52;1" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="75" r="12" fill="none" stroke="#F97316" stroke-width="4">
    <animate attributeName="r" values="12;12;16;12;12" keyTimes="0;0.32;0.42;0.54;1" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="75" r="4" fill="#FBBF24"/>

  <!-- impact shockwave -->
  <circle cx="750" cy="75" r="12" fill="none" stroke="#FBBF24" stroke-width="2" opacity="0">
    <animate attributeName="r" values="12;12;58;58" keyTimes="0;0.32;0.6;1" dur="4.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0;0" keyTimes="0;0.33;0.6;1" dur="4.5s" repeatCount="indefinite"/>
  </circle>

  <!-- caption -->
  <text x="410" y="132" text-anchor="middle" font-family="ui-monospace, 'Fira Code', 'Cascadia Code', monospace" font-size="14" fill="#8B949E" opacity="0">
    aim small · miss small
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.36;0.5;0.95;1" dur="4.5s" repeatCount="indefinite"/>
  </text>
</svg>
