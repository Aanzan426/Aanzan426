<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" width="1600" height="400" role="img" aria-label="Deepaansh Sial">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000814"/>
      <stop offset="45%" stop-color="#003559"/>
      <stop offset="100%" stop-color="#00B8DE"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#001B33"/>
      <stop offset="100%" stop-color="#00D9FF"/>
    </linearGradient>
  </defs>

  <!-- back wave, drifting right -->
  <g>
    <animateTransform attributeName="transform" type="translate" from="-800 0" to="0 0" dur="17s" repeatCount="indefinite"/>
    <path d="M0,285 C200,225 200,345 400,285 C600,225 600,345 800,285 C1000,225 1000,345 1200,285 C1400,225 1400,345 1600,285 C1800,225 1800,345 2000,285 C2200,225 2200,345 2400,285 L2400,0 L0,0 Z" fill="url(#g2)" opacity="0.4"/>
  </g>

  <!-- front wave, drifting left -->
  <g>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="-800 0" dur="11s" repeatCount="indefinite"/>
    <path d="M0,260 C200,200 200,320 400,260 C600,200 600,320 800,260 C1000,200 1000,320 1200,260 C1400,200 1400,320 1600,260 C1800,200 1800,320 2000,260 C2200,200 2200,320 2400,260 L2400,0 L0,0 Z" fill="url(#g)"/>
  </g>

  <text x="800" y="180" text-anchor="middle" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="70" font-weight="700" fill="#E6FCFF" letter-spacing="2" opacity="0">
    Deepaansh Sial
    <animate attributeName="opacity" values="0;1" begin="0.3s" dur="1.4s" fill="freeze"/>
  </text>
</svg>
