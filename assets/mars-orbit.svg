<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" width="140" height="140" role="img" aria-label="A CubeSat orbiting Mars on the grid">
  <defs>
    <radialGradient id="mars" cx="38%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="55%" stop-color="#C2410C"/>
      <stop offset="100%" stop-color="#431407"/>
    </radialGradient>
    <filter id="satglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- stars -->
  <g fill="#22D3EE">
    <circle cx="18" cy="24" r="1.6"><animate attributeName="opacity" values="1;0.2;1" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="118" cy="18" r="1.3"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="126" cy="106" r="1.6"><animate attributeName="opacity" values="1;0.3;1" dur="2.1s" repeatCount="indefinite"/></circle>
    <circle cx="14" cy="112" r="1.2"><animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="70" cy="8" r="1.2"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.8s" repeatCount="indefinite"/></circle>
  </g>

  <!-- planet with neon rim -->
  <circle cx="70" cy="70" r="26" fill="url(#mars)"/>
  <circle cx="70" cy="70" r="27.5" fill="none" stroke="#00D9FF" stroke-width="1" opacity="0.35"/>

  <!-- orbit path -->
  <circle cx="70" cy="70" r="52" fill="none" stroke="#06B6D4" stroke-width="1.5" stroke-dasharray="3 6" opacity="0.5"/>

  <!-- cubesat -->
  <g filter="url(#satglow)">
    <animateTransform attributeName="transform" type="rotate" from="0 70 70" to="360 70 70" dur="9s" repeatCount="indefinite"/>
    <g transform="translate(70 18)">
      <rect x="-6" y="-6" width="12" height="12" fill="#0F172A" stroke="#00D9FF" stroke-width="1.2" rx="2"/>
      <rect x="-20" y="-4" width="11" height="8" fill="#22D3EE" rx="1"/>
      <rect x="9" y="-4" width="11" height="8" fill="#22D3EE" rx="1"/>
    </g>
  </g>
</svg>
