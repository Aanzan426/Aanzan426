<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 230" width="1600" height="230" role="img" aria-label="— CRAS ITERUM —">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000814"/>
      <stop offset="45%" stop-color="#003559"/>
      <stop offset="100%" stop-color="#00B8DE"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#001B33"/>
      <stop offset="100%" stop-color="#00D9FF"/>
    </linearGradient>
  </defs>

  <!-- back wave, drifting right -->
  <g>
    <animateTransform attributeName="transform" type="translate" from="-800 0" to="0 0" dur="16s" repeatCount="indefinite"/>
    <path d="M0,85 C200,45 200,130 400,85 C600,45 600,130 800,85 C1000,45 1000,130 1200,85 C1400,45 1400,130 1600,85 C1800,45 1800,130 2000,85 C2200,45 2200,130 2400,85 L2400,230 L0,230 Z" fill="url(#g2)" opacity="0.4"/>
  </g>

  <!-- front wave, drifting left -->
  <g>
    <animateTransform attributeName="transform" type="translate" from="0 0" to="-800 0" dur="11s" repeatCount="indefinite"/>
    <path d="M0,105 C200,60 200,150 400,105 C600,60 600,150 800,105 C1000,60 1000,150 1200,105 C1400,60 1400,150 1600,105 C1800,60 1800,150 2000,105 C2200,60 2200,150 2400,105 L2400,230 L0,230 Z" fill="url(#g)"/>
  </g>

  <text x="800" y="182" text-anchor="middle" font-family="'Fira Code', 'Courier New', monospace" font-size="22" font-weight="600" fill="#7DD3FC" letter-spacing="7">&#8212; CRAS ITERUM &#8212;</text>
</svg>
