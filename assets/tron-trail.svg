<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 110" width="820" height="110" role="img" aria-label="A neon light trail draws across the grid and pulses">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- dark panel so the trail reads on light-theme GitHub too -->
  <rect x="0" y="0" width="820" height="110" rx="14" fill="#010409" stroke="#00D9FF" stroke-opacity="0.18" stroke-width="1.5"/>

  <!-- digital horizon -->
  <line x1="0" y1="84" x2="820" y2="84" stroke="#0E7490" stroke-width="1.5" opacity="0.3"/>
  <line x1="0" y1="92" x2="820" y2="92" stroke="#0E7490" stroke-width="8" stroke-dasharray="1.5 38.5" opacity="0.22"/>
  <line x1="0" y1="102" x2="820" y2="102" stroke="#0E7490" stroke-width="1" opacity="0.12"/>

  <!-- terminals -->
  <rect x="24" y="40" width="4" height="30" rx="1.5" fill="#00D9FF" filter="url(#glow)"/>
  <rect x="792" y="40" width="4" height="30" rx="1.5" fill="#00D9FF" filter="url(#glow)"/>

  <!-- light trail -->
  <line x1="34" y1="55" x2="786" y2="55" stroke="#00D9FF" stroke-width="3" stroke-linecap="round" filter="url(#glow)" stroke-dasharray="752" stroke-dashoffset="752">
    <animate attributeName="stroke-dashoffset" values="752;0;0" keyTimes="0;0.48;1" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;1;1;0;1" keyTimes="0;0.48;0.9;0.97;1" dur="5s" repeatCount="indefinite"/>
  </line>

  <!-- light-cycle head -->
  <circle cy="55" r="4.5" fill="#E0FFFF" filter="url(#glow)">
    <animate attributeName="cx" values="34;786;786" keyTimes="0;0.48;1" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.48;0.56;0.97;1" dur="5s" repeatCount="indefinite"/>
  </circle>

  <!-- arrival node -->
  <circle cx="786" cy="55" r="4" fill="#00D9FF" filter="url(#glow)" opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.46;0.5;0.9;0.96;1" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="r" values="4;4;9;5;5;4" keyTimes="0;0.46;0.54;0.62;0.9;1" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="786" cy="55" r="6" fill="none" stroke="#22D3EE" stroke-width="2" opacity="0">
    <animate attributeName="r" values="6;6;32;32" keyTimes="0;0.48;0.72;1" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.8;0;0" keyTimes="0;0.5;0.72;1" dur="5s" repeatCount="indefinite"/>
  </circle>
</svg>
