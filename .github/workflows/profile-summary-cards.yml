name: generate profile summary cards

on:
  schedule:
    - cron: "30 0 * * *" # daily, 6:00 IST
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          # PAT with repo + read:user scopes, stored as a repo secret,
          # so the cards can count private contributions (internship PRs).
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          UTC_OFFSET: 5
